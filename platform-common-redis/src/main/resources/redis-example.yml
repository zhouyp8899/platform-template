# Redis配置示例
# 将此配置复制到你的application.yml中并修改相应参数

platform:
  redis:
    # 是否启用Redis（默认true）
    enabled: true

    # 分布式锁配置
    lock:
      # 锁等待时间（秒），默认30秒
      wait-time: 30
      # 锁持有时间（秒），默认30秒
      lease-time: 30
      # 锁key前缀，默认"lock:"
      key-prefix: "lock:"

    # 缓存配置
    cache:
      #    缓存key前缀，默认"cache:"
      key-prefix: "cache:"
      # 默认过期时间（秒），默认3600秒（1小时）
      default-expire: 3600

    # 限流配置
    rate-limiter:
      # 限流key前缀，默认"rate:"
      key-prefix: "rate:"
      # 默认限流窗口时间（秒），默认60秒
      default-window: 60