# Redis配置示例
# 将此配置复制到你的application.yml中并修改相应参数

platform:
  redis:
    # 是否启用Redis（默认true）
    enabled: true

    # 分布式锁配置
    lock:
      # 锁等待时间（秒），默认30秒
      wait-time: 30
      # 锁持有时间（秒），默认30秒
      lease-time: 30
      # 锁key前缀，默认"lock:"
      key-prefix: "lock:"

    # 缓存配置
    cache:
      #    缓存key前缀，默认"cache:"
      key-prefix: "cache:"
      # 默认过期时间（秒），默认3600秒（1小时）
      default-expire: 3600

    # 限流配置
    rate-limiter:
      # 限流key前缀，默认"rate:"
      key-prefix: "rate:"
      # 默认限流窗口时间（秒），默认60秒
      default-window: 60

# Spring Redis配置
spring:
  data:
    redis:
      # Redis服务器地址
      host: localhost
      # Redis端口
      port: 6379
      # Redis密码（无密码则留空）
      # password: yourpassword
      # Redis数据库索引
      database: 0
      # 连接超时时间（毫秒）
      timeout: 3000
      # Lettuce连接池配置
      lettuce:
        pool:
          # 最大连接数
          max-active: 8
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 0
          # 连接等待超时时间（毫秒）
          max-wait: -1

  # Redisson配置
  redisson:
    # 单机模式配置
    single-server-config:
      address: "redis://localhost:6379"
      # 密码（无密码则留空）
      # password: yourpassword
      # 数据库索引
      database: 0
      # 连接池大小
      connection-pool-size: 10
      # 最小空闲连接数
      connection-minimum-idle-size: 2
      # 连接超时时间（毫秒）
      timeout: 3000

    # 如果是集群模式，使用cluster-servers-config配置
    # cluster-servers-config:
    #   node-addresses:
    #     - "redis://node1:6379"
    #     - "redis://node2:6379"
    #     - "redis://node3:6379"
    #   password: yourpassword
    #   connection-pool-size: 10
    #   timeout: 3000

